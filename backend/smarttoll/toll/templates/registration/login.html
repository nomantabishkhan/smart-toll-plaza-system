<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Smart Toll - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-gradient-to-br from-blue-50 to-slate-100 min-h-screen flex items-center justify-center">
    <div class="w-full max-w-md bg-white rounded-lg shadow-lg p-8">
      <div class="text-center mb-8">
        <h1 class="text-3xl font-bold text-slate-900">Smart Toll</h1>
        <p class="text-sm text-slate-500 mt-1">Plaza Audit System</p>
      </div>
      
      <form method="post" class="space-y-4">
        {% csrf_token %}
        {% if form.non_field_errors %}
          <div class="bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded">
            <p class="text-sm font-semibold">Login failed</p>
            <ul class="text-sm mt-1">
              {% for error in form.non_field_errors %}
                <li>{{ error }}</li>
              {% endfor %}
            </ul>
          </div>
        {% endif %}
        
        <div>
          <label for="{{ form.username.id_for_label }}" class="block text-sm font-medium text-slate-700 mb-1">
            Username
          </label>
          <input 
            type="text" 
            name="username" 
            id="{{ form.username.id_for_label }}"
            placeholder="admin"
            class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
            required
            autofocus
          />
        </div>

        <div>
          <label for="{{ form.password.id_for_label }}" class="block text-sm font-medium text-slate-700 mb-1">
            Password
          </label>
          <input 
            type="password" 
            name="password" 
            id="{{ form.password.id_for_label }}"
            placeholder="••••••••"
            class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
            required
          />
        </div>

        <button 
          type="submit" 
          class="w-full bg-blue-600 text-white py-2 rounded-lg font-semibold hover:bg-blue-700 transition"
        >
          Login
        </button>
      </form>

      <p class="text-center text-sm text-slate-500 mt-6">
        Default credentials: <code class="bg-slate-100 px-2 py-1 rounded text-xs">admin</code> / <code class="bg-slate-100 px-2 py-1 rounded text-xs">admin123</code>
      </p>
    </div>
  </body>
</html>
